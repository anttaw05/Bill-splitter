<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utility Bill Splitter</title>

<style>
    * {
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    body {
        background: #f4f6f9;
        display: flex;
        justify-content: center;
        padding: 40px;
    }

    .container {
        background: white;
        width: 800px;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
        text-align: center;
        margin-bottom: 25px;
    }

    .bill-section {
        margin-bottom: 20px;
    }

    label {
        font-weight: bold;
    }

    input, select {
        width: 100%;
        padding: 10px;
        margin-top: 6px;
        border: 1px solid #ccc;
        border-radius: 6px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
    }

    th, td {
        padding: 12px;
        border-bottom: 1px solid #ddd;
        text-align: center;
    }

    th {
        background: #f8f9fa;
    }

    button {
        padding: 8px 10px;
        border: none;
        border-radius: 6px;
        background: #007bff;
        color: white;
        cursor: pointer;
        font-size: 12px;
    }

    button:hover {
        background: #0056b3;
    }

    .result {
        font-weight: bold;
        color: #28a745;
    }

    .calc-btn {
        width: 100%;
        padding: 14px;
        margin-top: 20px;
        font-size: 16px;
        background: #28a745;
    }

    .calc-btn:hover {
        background: #1f7a33;
    }
</style>
</head>

<body>

<div class="container">

    <h1>Utility Bill Splitter</h1>

    <!-- BILL -->
    <div class="bill-section">
        <label>Utility Bill ($)</label>
        <input type="number" id="bill" placeholder="Enter total bill">
    </div>

    <!-- MONTH SELECTOR -->
    <div class="bill-section">
        <label>Select Month</label>
        <select id="monthSelect">
            <option value="0">January</option>
            <option value="1">February</option>
            <option value="2">March</option>
            <option value="3">April</option>
            <option value="4">May</option>
            <option value="5">June</option>
            <option value="6">July</option>
            <option value="7">August</option>
            <option value="8">September</option>
            <option value="9">October</option>
            <option value="10">November</option>
            <option value="11">December</option>
        </select>
    </div>

    <!-- TABLE -->
    <table>
        <thead>
            <tr>
                <th>Person</th>
                <th>Days Stayed</th>
                <th>Actions</th>
                <th>Owed</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Dya</td>
                <td><input type="number" id="Dya" min="0"></td>
                <td><button onclick="fillPerson('Dya')">Whole Month</button></td>
                <td class="result" id="Dya-result">$0.00</td>
            </tr>

            <tr>
                <td>Jay</td>
                <td><input type="number" id="Jay" min="0"></td>
                <td><button onclick="fillPerson('Jay')">Whole Month</button></td>
                <td class="result" id="Jay-result">$0.00</td>
            </tr>

            <tr>
                <td>Kyle</td>
                <td><input type="number" id="Kyle" min="0"></td>
                <td><button onclick="fillPerson('Kyle')">Whole Month</button></td>
                <td class="result" id="Kyle-result">$0.00</td>
            </tr>

            <tr>
                <td>Anthony</td>
                <td><input type="number" id="Anthony" min="0"></td>
                <td><button onclick="fillPerson('Anthony')">Whole Month</button></td>
                <td class="result" id="Anthony-result">$0.00</td>
            </tr>

            <tr>
                <td>Simon</td>
                <td><input type="number" id="Simon" min="0"></td>
                <td><button onclick="fillPerson('Simon')">Whole Month</button></td>
                <td class="result" id="Simon-result">$0.00</td>
            </tr>
        </tbody>
    </table>

    <button class="calc-btn" onclick="calculateSplit()">Calculate</button>

</div>

<script>

const people = ["Dya", "Jay", "Kyle", "Anthony", "Simon"];

function getDaysInMonth() {
    const month = parseInt(document.getElementById("monthSelect").value);
    const year = new Date().getFullYear();
    return new Date(year, month + 1, 0).getDate();
}

function fillPerson(person) {
    const days = getDaysInMonth();
    document.getElementById(person).value = days;
}

function calculateSplit() {
    const bill = parseFloat(document.getElementById("bill").value) || 0;

    let totalDays = 0;

    people.forEach(p => {
        totalDays += parseFloat(document.getElementById(p).value) || 0;
    });

    if (totalDays === 0) {
        alert("Enter at least one person's days.");
        return;
    }

    const costPerDay = bill / totalDays;

    people.forEach(p => {
        const days = parseFloat(document.getElementById(p).value) || 0;
        const owed = costPerDay * days;

        document.getElementById(`${p}-result`).textContent =
            `$${owed.toFixed(2)}`;
    });
}

</script>

</body>
</html>
